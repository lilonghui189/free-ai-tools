<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOM42 AI｜家纺商业级超清创作平台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
        body{display:flex;height:100vh;background:#0b101d;color:#e6edf3;overflow:hidden;}
        ::-webkit-scrollbar{width:6px;}
        ::-webkit-scrollbar-thumb{background:#2a3447;border-radius:3px;}
        .sidebar{width:240px;background:#121829;border-right:1px solid #222b3f;padding:24px 0;display:flex;flex-direction:column;}
        .logo{font-size:24px;font-weight:700;color:#60a5fa;text-align:center;margin-bottom:40px;user-select:none;}
        .nav-item{padding:14px 20px;margin:4px 8px;border-radius:8px;cursor:pointer;transition:0.2s;color:#a0aec0;display:flex;align-items:center;gap:10px;}
        .nav-item.active,.nav-item:hover{background:#1e293b;color:#fff;}
        .main{flex:1;padding:30px;overflow-y:auto;}
        .page{display:none;}
        .page.active{display:block;}
        h2{font-size:22px;margin-bottom:20px;color:#f1f5f9;}
        .box{background:#121829;border:1px solid #222b3f;border-radius:12px;padding:18px;margin-bottom:20px;}
        .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:15px;}
        input,textarea,select{width:100%;background:#0b101d;border:1px solid #222b3f;border-radius:8px;padding:12px;color:#e6edf3;outline:none;}
        textarea{min-height:120px;resize:vertical;}
        button{background:#1d4ed8;color:#fff;border:0;border-radius:8px;padding:11px 16px;cursor:pointer;transition:.2s;}
        button:hover{background:#1e40af;}
        .btn-gray{background:#334155;}
        .result{margin-top:15px;background:#121829;border-radius:10px;padding:16px;min-height:160px;white-space:pre-wrap;}
        .img-out{max-width:100%;border-radius:10px;margin-top:10px;}
        #maskCanvas{max-width:100%;border-radius:10px;cursor:crosshair;margin:10px 0;}
        .tag{padding:8px;border-radius:6px;background:#1e293b;border:1px solid #2a3447;font-size:13px;cursor:pointer;}
        .tag:hover{border-color:#60a5fa;color:#60a5fa;}
        .loading{color:#60a5fa;animation:flash 1s infinite;}
        @keyframes flash{0%,100%{opacity:1;}50%{opacity:0.4;}}
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">LOOM42 AI</div>
        <div class="nav-item active" data-page="chat">💬 家纺文案</div>
        <div class="nav-item" data-page="txt2img">🎨 超清文生图</div>
        <div class="nav-item" data-page="img2img">🖌️ 图生图/局部重绘</div>
        <div class="nav-item" data-page="tools">🧰 实用工具</div>
    </div>

    <div class="main">
        <!-- 文案 -->
        <div class="page active" id="chat">
            <h2>高端家纺｜电商爆款文案</h2>
            <div class="box">
                <div class="row">
                    <div class="tag" onclick="p1()">奶油风四件套</div>
                    <div class="tag" onclick="p2()">原木风床品</div>
                    <div class="tag" onclick="p3()">轻奢高级文案</div>
                </div>
            </div>
            <textarea id="cInp" placeholder="输入产品：水洗棉、天丝、磨毛、刺绣四件套..."></textarea>
            <div style="margin:15px 0;display:flex;gap:10px;">
                <button onclick="genChat()">生成高端文案</button>
                <button class="btn-gray" onclick="cInp.value=''">清空</button>
            </div>
            <div class="result" id="cRes"></div>
        </div>

        <!-- 超清文生图（高端商业画质） -->
        <div class="page" id="txt2img">
            <h2>商业级超清家纺渲染</h2>
            <div class="box">
                <div class="row">
                    <div class="tag" onclick="s1()">ins奶油风｜卧室实景</div>
                    <div class="tag" onclick="s2()">日式原木｜治愈软装</div>
                    <div class="tag" onclick="s3()">轻奢高级｜商业大片</div>
                </div>
            </div>
            <textarea id="tInp" placeholder="自动自带：高级光影、8K、商业摄影、写实、柔焦氛围感"></textarea>
            <div style="margin:15px 0;">
                <button onclick="genImg()">一键超清出图</button>
            </div>
            <div class="result" id="tRes"></div>
        </div>

        <!-- 图生图 + 局部重绘 -->
        <div class="page" id="img2img">
            <h2>图片高级改造｜局部涂抹修改</h2>
            <div class="box">
                <input type="file" id="upImg" accept="image/*">
            </div>
            <canvas id="maskCanvas"></canvas>
            <textarea id="iInp" placeholder="例如：换成奶油风碎花、升级高级光影、更换原木卧室背景、提升质感"></textarea>
            <div style="margin:15px 0;display:flex;gap:10px;">
                <button onclick="allRedraw()">整张高级重绘</button>
                <button onclick="partRedraw()">涂抹局部重绘</button>
                <button class="btn-gray" onclick="clearMask()">清除蒙版</button>
            </div>
            <div class="result" id="iRes"></div>
        </div>

        <!-- 工具 -->
        <div class="page" id="tools">
            <h2>常用免费工具</h2>
            <div class="box" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <a href="https://www.remove.bg" target="_blank" style="color:#fff;padding:15px;background:#1e293b;border-radius:8px;text-align:center;text-decoration:none;">一键抠图</a>
                <a href="https://smallpdf.com" target="_blank" style="color:#fff;padding:15px;background:#1e293b;border-radius:8px;text-align:center;text-decoration:none;">PDF处理</a>
            </div>
        </div>
    </div>

    <script>
        // 侧边切换
        document.querySelectorAll('.nav-item').forEach(e=>{
            e.onclick=()=>{
                document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
                document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
                e.classList.add('active');
                document.getElementById(e.dataset.page).classList.add('active');
            }
        });

        // 文案快捷模板
        function p1(){cInp.value="奶油风纯色四件套，软糯亲肤，ins治愈卧室，写淘宝标题+详情+小红书文案";}
        function p2(){cInp.value="日式原木风纯棉床品，简约干净，自然柔光，高级简约带货文案";}
        function p3(){cInp.value="轻奢刺绣四件套，高精密面料，酒店风高级质感，高端电商文案";}

        // 绘图高端固定画质词（决定你要的高级效果）
        const baseHigh = "commercial product photography, luxury bedding set, soft natural lighting, bedroom interior, high-end texture, 8K, ultra detailed, soft focus, atmosphere, realistic shot, depth of field, no watermark, no text, high end home textile";
        const neg = "ugly, blurry, low res, deformed, logo, text, watermark, cartoon, painting, illustration";

        // 风格快捷
        function s1(){tInp.value="cream style bedding, ins wind bedroom, milk color soft decoration,"+baseHigh;}
        function s2(){tInp.value="japanese wabi sabi bedding, log furniture, natural soft light,"+baseHigh;}
        function s3(){tInp.value="luxury hotel style bedding, advanced sense, dark advanced tone,"+baseHigh;}

        // 高端文案生成
        async function genChat(){
            let v = cInp.value.trim();
            let box = cRes;
            if(!v){box.innerText="请输入产品";return;}
            box.innerHTML="<div class='loading'>高端文案撰写中...</div>";
            let p = "你是高端家纺品牌文案师，文案高级、简约、有质感，适合电商详情、小红书、朋友圈："+v;
            let res = await fetch("https://peach-biplane.glitch.me/ai?msg="+encodeURIComponent(p));
            let txt = await res.text();
            box.innerText = txt;
        }

        // 超清商业级绘图（锁定高端画质）
        function genImg(){
            let v = tInp.value.trim();
            let box = tRes;
            if(!v){box.innerText="请选择风格或输入描述";return;}
            box.innerHTML="<div class='loading'>商业级超清渲染中...</div>";
            let url = `https://image.pollinations.ai/prompt/${encodeURIComponent(v)},${neg}?width=1280&height=960&hd=true`;
            box.innerHTML = `<img class="img-out" src="${url}">`;
        }

        // 画布蒙版
        let canvas,ctx,imgObj,isDraw=false;
        window.onload=function(){
            canvas = maskCanvas;
            ctx = canvas.getContext("2d");
            upImg.onchange=e=>{
                let f = e.target.files[0];
                let img = new Image();
                img.onload=function(){
                    imgObj = img;
                    canvas.width = 720;
                    canvas.height = canvas.width * img.height / img.width;
                    ctx.drawImage(img,0,0,canvas.width,canvas.height);
                }
                img.src = URL.createObjectURL(f);
            }
            canvas.onmousedown=()=>isDraw=true;
            canvas.onmouseup=()=>isDraw=false;
            canvas.onmousemove=draw;
        }
        function draw(e){
            if(!isDraw||!imgObj)return;
            let r = canvas.getBoundingClientRect();
            let x = e.clientX - r.left;
            let y = e.clientY - r.top;
            ctx.fillStyle="rgba(0,0,0,0.9)";
            ctx.beginPath();
            ctx.arc(x,y,15,0,Math.PI*2);
            ctx.fill();
        }
        function clearMask(){
            if(!imgObj)return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.drawImage(imgObj,0,0,canvas.width,canvas.height);
        }

        // 整张&局部重绘 高端画质锁定
        function allRedraw(){
            let txt = iInp.value;
            let b64 = canvas.toDataURL("image/jpeg");
            let url = `https://image.pollinations.ai/prompt/${encodeURIComponent(txt)},${baseHigh},${neg}&img=${b64}&width=1280`;
            iRes.innerHTML = `<img class="img-out" src="${url}">`;
        }
        function partRedraw(){
            let txt = iInp.value;
            let url = `https://image.pollinations.ai/prompt/${encodeURIComponent(txt)},local edit,high end textile,${neg}&width=1280`;
            iRes.innerHTML = `<img class="img-out" src="${url}">`;
        }
    </script>
</body>
</html>
